apiVersion: skaffold/v4beta13
kind: Config


build:

  tagPolicy:
    sha256: {}
      
  artifacts:

     - image: ai-orchasteration
       context: ai-orchasteration
       docker:
        dockerfile: dockerfile
       sync:
        infer:
          - 'src/**' 
        
     - image: auth
       context: auth
       docker:
        dockerfile: dockerfile
       sync:
        infer:
          - "src/**"
    

     - image: notification
       context: notification
       docker:
        dockerfile: dockerfile
       sync:
        infer:
          - "src/**"


     - image: agent
       context: sandbox/agent
       docker:
        dockerfile: dockerfile
    
     - image: router
       context: sandbox/router
       docker:
        dockerfile: dockerfile

     - image: sandbox
       context: sandbox/server
       docker:
        dockerfile: dockerfile


     - image: template
       context: sandbox/template
       docker:
        dockerfile: dockerfile
     
      
manifests:
  rawYaml:
    - k8s/ai-deployment.yml
    - k8s/ai-service.yml
    - k8s/auth-deployment.yml
    - k8s/auth-service.yml 
    - k8s/ingress.yml
    - k8s/sandbox-deployment.yaml
    - k8s/sandbox-service.yaml
    - k8s/router-deployment.yml
    - k8s/router-service.yml 
    - k8s/notification-deployment.yml
    - k8s/notification-service.yml
    # - k8s/secrets.yml
    # - k8s/rbac.yml